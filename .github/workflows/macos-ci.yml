name: macOS CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      release_candidate:
        description: "Run the complete verification lane as a release candidate"
        required: false
        default: false
        type: boolean

permissions: {}

jobs:
  verify:
    permissions:
      contents: read
    env:
      PULL_REQUEST_BODY: ${{ github.event.pull_request.body }}
    runs-on: macos-14
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - run: node scripts/run-gitleaks.mjs
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
        with:
          path: |
            node_modules/.cache/clarifold-lean
            dist/verifiers
          key: bundled-lean-4.29.1-mathlib-4.29.1-foundations-v4-${{ runner.arch }}
      - name: Classify changed paths and verification surfaces
        id: classify
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -o pipefail
          publish_classifier_outputs() {
            while IFS= read -r line; do
              printf '%s\n' "$line"
              case "$line" in
                github-output:*) printf '%s\n' "${line#github-output:}" >> "$GITHUB_OUTPUT" ;;
              esac
            done
          }
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            node scripts/change-classifier.mjs --base "$BASE_SHA" --head "$HEAD_SHA" | publish_classifier_outputs
          else
            node scripts/change-classifier.mjs --all | publish_classifier_outputs
          fi
      - run: npm run verify:prepackage
      - run: npm run security:dependencies
      - name: Run complete native and packaged verification lane
        if: steps.classify.outputs.artifact_affected == 'true' || github.event_name != 'pull_request' || inputs.release_candidate == true
        run: npm run security:swift && npm run verify:package
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: failure()
        with:
          name: macos-ci-diagnostics-attempt-${{ github.run_attempt }}
          if-no-files-found: warn
          retention-days: 30
          path: |
            test-results/playwright-artifacts
            test-results/beta-install.json
      - id: beta-artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success() && (steps.classify.outputs.artifact_affected == 'true' || github.event_name != 'pull_request' || inputs.release_candidate == true)
        with:
          name: clarifold-macos-beta-${{ runner.arch }}
          if-no-files-found: error
          path: |
            out/make/zip/darwin/*/Clarifold-darwin-*.zip
            test-results/beta-install.json
      - name: Record uploaded beta binding
        if: success() && (steps.classify.outputs.artifact_affected == 'true' || github.event_name != 'pull_request' || inputs.release_candidate == true)
        env:
          ARTIFACT_DIGEST: ${{ steps.beta-artifact.outputs.artifact-digest }}
          ARTIFACT_NAME: clarifold-macos-beta-${{ runner.arch }}
          CANDIDATE_COMMIT: ${{ github.sha }}
        run: node scripts/record-beta-upload-binding.mjs
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success() && (steps.classify.outputs.artifact_affected == 'true' || github.event_name != 'pull_request' || inputs.release_candidate == true)
        with:
          name: clarifold-macos-beta-binding-${{ runner.arch }}
          if-no-files-found: error
          path: test-results/beta-upload-binding.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        if: success() && (steps.classify.outputs.artifact_affected == 'true' || github.event_name != 'pull_request' || inputs.release_candidate == true)
        with:
          name: quality-gate-harness-fixture-only
          if-no-files-found: error
          path: |
            test-results/quality-gate/*.json
            test-results/quality-gate/*.md
