version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      npm-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      npm-version-updates:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: monthly
    open-pull-requests-limit: 5
    groups:
      actions-security-updates:
        applies-to: security-updates
        patterns:
          - "*"
      actions-version-updates:
        applies-to: version-updates
        patterns:
          - "*"
